rules:
  # seedling
  - metric: air_temp_c
    phase: seedling
    warn_min: 22
    warn_max: 27
    critical_min: 20
    critical_max: 29
    cooldown_minutes: 30
    hysteresis: 0.5

  - metric: humidity_pct
    phase: seedling
    warn_min: 60
    warn_max: 75
    critical_min: 50
    critical_max: 85
    cooldown_minutes: 30
    hysteresis: 2

  - metric: soil_moisture_pct
    phase: seedling
    warn_min: 45
    warn_max: 70
    critical_min: 35
    critical_max: 80
    cooldown_minutes: 45
    hysteresis: 2

  - metric: co2_ppm
    phase: seedling
    warn_min: 350
    warn_max: 900
    critical_min: 250
    critical_max: 1200
    cooldown_minutes: 30
    hysteresis: 25

  - metric: light_pct
    phase: seedling
    warn_min: 20
    warn_max: 100
    critical_min: 10
    critical_max: 100
    cooldown_minutes: 30
    hysteresis: 2

  # veg
  - metric: air_temp_c
    phase: veg
    warn_min: 20
    warn_max: 28
    critical_min: 18
    critical_max: 30
    cooldown_minutes: 30
    hysteresis: 0.5

  - metric: humidity_pct
    phase: veg
    warn_min: 50
    warn_max: 70
    critical_min: 40
    critical_max: 80
    cooldown_minutes: 30
    hysteresis: 2

  - metric: soil_moisture_pct
    phase: veg
    warn_min: 25
    warn_max: 55
    critical_min: 20
    critical_max: 65
    cooldown_minutes: 45
    hysteresis: 2

  - metric: co2_ppm
    phase: veg
    warn_min: 350
    warn_max: 1400
    critical_min: 250
    critical_max: 2000
    cooldown_minutes: 30
    hysteresis: 25

  - metric: light_pct
    phase: veg
    warn_min: 45
    warn_max: 100
    critical_min: 30
    critical_max: 100
    cooldown_minutes: 30
    hysteresis: 2

  # bloom
  - metric: air_temp_c
    phase: bloom
    warn_min: 20
    warn_max: 26
    critical_min: 18
    critical_max: 28
    cooldown_minutes: 30
    hysteresis: 0.5

  - metric: humidity_pct
    phase: bloom
    warn_min: 40
    warn_max: 55
    critical_min: 35
    critical_max: 65
    cooldown_minutes: 30
    hysteresis: 2

  - metric: soil_moisture_pct
    phase: bloom
    warn_min: 30
    warn_max: 55
    critical_min: 25
    critical_max: 65
    cooldown_minutes: 45
    hysteresis: 2

  - metric: co2_ppm
    phase: bloom
    warn_min: 400
    warn_max: 1200
    critical_min: 300
    critical_max: 1600
    cooldown_minutes: 30
    hysteresis: 25

  - metric: light_pct
    phase: bloom
    warn_min: 70
    warn_max: 100
    critical_min: 60
    critical_max: 100
    cooldown_minutes: 30
    hysteresis: 2
